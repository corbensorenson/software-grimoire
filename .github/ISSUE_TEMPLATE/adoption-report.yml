name: Adoption evidence report
description: Report real use of a spell, stack, export, or benchmark workflow.
title: "[adoption] "
labels: ["adoption", "evidence"]
body:
  - type: dropdown
    id: provenance
    attributes:
      label: Provenance
      options:
        - reviewer-supplied
        - external-user
        - project-owned
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the real task, artifact boundary, and risk level.
    validations:
      required: true
  - type: input
    id: spell_or_stack
    attributes:
      label: Spell or stack used
      description: Example: spell.safe-refactoring.v1 or stack.release-gate-stack.v1.
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: Surface
      description: Name the model, CLI, IDE, review process, or manual workflow used.
    validations:
      required: true
  - type: textarea
    id: artifact
    attributes:
      label: Artifact produced
      description: Link or describe the output artifact. Do not include secrets or private customer data.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification performed
      description: Tests, commands, review checks, screenshots, or human review used to judge the result.
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Failure or friction
      description: Include overkill, missing clauses, confusing vocabulary, failed attempts, or adoption cost.
    validations:
      required: true
  - type: dropdown
    id: reuse
    attributes:
      label: Reuse decision
      options:
        - reuse
        - revise
        - retire
        - keep-as-reference
    validations:
      required: true
