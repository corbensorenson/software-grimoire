name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      index:
        description: "Package index target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      version:
        description: "Expected pyproject.toml version to publish"
        required: true
        default: "3.0.0"
        type: string
      confirmation:
        description: "Type: publish software-grimoire"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build and preflight package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build and test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema build twine

      - name: Validate manual confirmation and version
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = "publish software-grimoire"
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = pyproject["project"]["version"]
          expected = os.environ["EXPECTED_VERSION"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual!r} does not match requested version {expected!r}")
          PY

      - name: Generate reference content
        run: python scripts/bootstrap_project.py

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Validate package publish workflow
        run: python scripts/check_package_publish_workflow.py

      - name: Run tests
        run: python -m pytest

      - name: Check package build and install
        run: python scripts/check_package.py

      - name: Check package-index command contract
        run: python scripts/check_package_index.py --index "${{ inputs.index }}" --dry-run --write-report "tmp/package-index-smoke-${{ inputs.index }}-dry-run.json"

      - name: Render site
        run: quarto render

      - name: Smoke-check rendered site
        run: python scripts/smoke_public_site.py

      - name: Build distributions
        run: |
          rm -rf dist
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: software-grimoire-dist
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ inputs.index == 'testpypi' }}
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: software-grimoire-dist
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Smoke-check TestPyPI install
        run: |
          for attempt in 1 2 3 4 5; do
            if python scripts/check_package_index.py --index testpypi --version "${{ inputs.version }}" --uploader "${{ github.actor }}" --write-report tmp/package-index-smoke-testpypi.json; then
              exit 0
            fi
            echo "TestPyPI smoke attempt $attempt failed; waiting for package-index propagation."
            sleep 30
          done
          exit 1

      - name: Upload package-index smoke report
        uses: actions/upload-artifact@v4
        with:
          name: package-index-smoke-testpypi
          path: tmp/package-index-smoke-testpypi.json
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ inputs.index == 'pypi' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: software-grimoire-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Smoke-check PyPI install
        run: |
          for attempt in 1 2 3 4 5; do
            if python scripts/check_package_index.py --index pypi --version "${{ inputs.version }}" --uploader "${{ github.actor }}" --write-report tmp/package-index-smoke-pypi.json; then
              exit 0
            fi
            echo "PyPI smoke attempt $attempt failed; waiting for package-index propagation."
            sleep 30
          done
          exit 1

      - name: Upload package-index smoke report
        uses: actions/upload-artifact@v4
        with:
          name: package-index-smoke-pypi
          path: tmp/package-index-smoke-pypi.json
          if-no-files-found: error
