name: Check Quarto Site

on:
  pull_request:
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Generate reference content
        run: python scripts/bootstrap_project.py

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Render site
        run: quarto render

      - name: Test generated site and data
        run: python -m pytest
