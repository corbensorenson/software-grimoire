name: Publish Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema build

      - name: Generate reference content
        run: python scripts/bootstrap_project.py

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Run adversarial harness
        run: python scripts/run_adversarial_harness.py

      - name: Run execution bench
        run: python scripts/run_execution_bench.py

      - name: Run Bench v4 hardness ladder
        run: python scripts/run_hardness_bench.py

      - name: Check package build and install
        run: python scripts/check_package.py

      - name: Refresh generated evidence pages
        run: python scripts/bootstrap_project.py

      - name: Validate bench import contract
        run: python scripts/run_bench.py import examples/evaluations/manual-import-template.json

      - name: Validate Bench v4 hardness import contract
        run: python scripts/import_hardness_model_run.py validate examples/evaluations/hardness-v4/manual-import-template.json

      - name: Render site
        run: quarto render

      - name: Smoke-check rendered site
        run: python scripts/smoke_public_site.py

      - name: Refresh smoke-check page
        run: python scripts/bootstrap_project.py

      - name: Render site with smoke report
        run: quarto render

      - name: Test generated site and data
        run: python -m pytest

      - name: Publish site branch
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          unset GIT_DIR
          unset GIT_WORK_TREE
          publish_dir="$RUNNER_TEMP/software-grimoire-gh-pages"
          rm -rf "$publish_dir"
          mkdir -p "$publish_dir"
          git -C "$publish_dir" init --initial-branch=gh-pages
          git -C "$publish_dir" config user.name "github-actions[bot]"
          git -C "$publish_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rsync -a --delete "_site/" "$publish_dir/"
          touch "$publish_dir/.nojekyll"
          git -C "$publish_dir" add -A
          git -C "$publish_dir" commit -m "Publish site for ${GITHUB_SHA}"
          git -C "$publish_dir" push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
