name: Publish Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema build

      - name: Generate reference content
        run: python scripts/bootstrap_project.py

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Run adversarial harness
        run: python scripts/run_adversarial_harness.py

      - name: Run execution bench
        run: python scripts/run_execution_bench.py

      - name: Run Bench v4 hardness ladder
        run: python scripts/run_hardness_bench.py

      - name: Check package build and install
        run: python scripts/check_package.py

      - name: Refresh generated evidence pages
        run: python scripts/bootstrap_project.py

      - name: Validate bench import contract
        run: python scripts/run_bench.py import examples/evaluations/manual-import-template.json

      - name: Validate Bench v4 hardness import contract
        run: python scripts/import_hardness_model_run.py validate examples/evaluations/hardness-v4/manual-import-template.json

      - name: Render site
        run: quarto render

      - name: Smoke-check rendered site
        run: python scripts/smoke_public_site.py

      - name: Refresh smoke-check page
        run: python scripts/bootstrap_project.py

      - name: Render site with smoke report
        run: quarto render

      - name: Test generated site and data
        run: python -m pytest

      - uses: actions/configure-pages@v6

      - name: Archive Pages artifact
        shell: sh
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "_site" \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000
