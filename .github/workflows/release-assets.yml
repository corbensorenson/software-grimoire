name: Publish Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to"
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pytest jsonschema build

      - name: Generate release assets
        run: python scripts/bootstrap_project.py

      - name: Validate generated assets
        run: python scripts/validate_data.py

      - name: Validate package publish workflow
        run: python scripts/check_package_publish_workflow.py

      - name: Run execution bench
        run: python scripts/run_execution_bench.py

      - name: Run Bench v4 hardness ladder
        run: python scripts/run_hardness_bench.py

      - name: Check package build and install
        run: python scripts/check_package.py

      - name: Refresh generated evidence pages
        run: python scripts/bootstrap_project.py

      - name: Validate refreshed generated assets
        run: python scripts/validate_data.py

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload bundle assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            exports/bundles/*.zip \
            exports/library-manifest.json \
            exports/checksums.sha256 \
            --clobber
