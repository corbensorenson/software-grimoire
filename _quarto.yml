        - chapters/06-field-spells.qmd
        - chapters/07-public-canon.qmd
        - chapters/08-stackcraft.qmd
        - chapters/09-tooling-and-formalization.qmd
        - chapters/10-living-practice.qmd
        - chapters/11-adversarial-promptcraft.qmd
    - part: "Spell Library"
      chapters:
